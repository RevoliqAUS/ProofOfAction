<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="fc:frame" content='{"version":"next","imageUrl":"https://proof-of-action-eight.vercel.app/videoframe_7948.png","button":{"title":"Launch PoA Judge","action":{"type":"launch_frame","name":"PoA Labs","url":"https://proof-of-action-eight.vercel.app/","splashImageUrl":"https://proof-of-action-eight.vercel.app/videoframe_7948.png","splashBackgroundColor":"#000000"}}}' />

    <title>PoA Labs - Zero Trust AI Judge</title>

    <script>
        (function () {
            const secureNetworkAPI = (apiName) => {
                const originalAPI = window[apiName];
                try {
                    const funcStr = Function.prototype.toString.call(originalAPI);
                    if (!funcStr.includes('[native code]')) { triggerFallback(apiName); return; }
                } catch (e) { triggerFallback(apiName); return; }

                try {
                    Object.defineProperty(window, apiName, { value: originalAPI, writable: false, configurable: false });
                } catch (err) { triggerFallback(apiName); }
            };
            const triggerFallback = (apiName) => {
                console.error(`[Security Breach] ${apiName} altered!`);
                window.location.reload();
            };
            secureNetworkAPI('fetch');
            secureNetworkAPI('XMLHttpRequest');
        })();
    </script>

    <script src="https://unpkg.com/@msgpack/msgpack"></script>
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/index.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px 2px rgba(34, 197, 94, 0.8); animation: scan 2s linear infinite; }
        .matrix-text { font-family: 'Courier New', Courier, monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="bg-black text-green-500 flex flex-col items-center justify-center h-screen p-6 overflow-hidden">

    <div class="border-2 border-green-900 bg-black/80 p-6 rounded-lg w-full max-w-md relative overflow-hidden shadow-[0_0_20px_rgba(0,50,0,0.5)] flex flex-col max-h-[90vh]">
        <div id="scanner" class="hidden scan-line"></div>

        <header class="mb-4 border-b border-green-900 pb-2 flex justify-between items-end shrink-0">
            <div>
                <h1 class="text-xl font-bold tracking-widest uppercase">PoA Labs</h1>
                <p class="text-[9px] text-green-700 matrix-text">SECURE_TUNNEL: <span id="user-name">GUEST_DEGEN</span></p>
            </div>
            <div class="text-[8px] text-green-800 text-right">
                ZERO_TRUST: ACTIVE<br>MSGPACK: WASM_ON
            </div>
        </header>

        <div class="mb-3 w-full shrink-0">
            <input type="text" id="rule-input" value="Analyze the golf swing in the video, focusing on the black device worn on the player's left wrist. Confirm whether it is a HackMotion wrist sensor..." class="w-full bg-green-950/30 border border-green-800 text-green-400 text-[10px] p-2 focus:outline-none focus:border-green-500 font-mono" placeholder="> ENTER_VERIFICATION_RULE">
        </div>

        <div class="mb-4 w-full flex justify-between items-center border border-green-800 p-2 bg-green-950/20 shrink-0">
            <input type="file" id="video-upload" accept="video/mp4,video/quicktime" class="hidden" onchange="document.getElementById('file-name').innerText = '> FILE: ' + this.files[0].name">
            <label for="video-upload" class="cursor-pointer text-green-600 hover:text-green-400 text-[10px] uppercase transition-all whitespace-nowrap">
                [ SELECT_VIDEO ]
            </label>
            <span id="file-name" class="text-[9px] text-green-700 truncate max-w-[180px] text-right">> NO_FILE</span>
        </div>
        
        <div id="status-box" class="flex-grow min-h-[160px] border border-green-900/50 bg-green-950/10 rounded mb-4 matrix-text text-[10px] p-4 overflow-y-auto no-scrollbar relative">
            <span class="animate-pulse">> SYSTEM READY...</span><br>
            <span class="text-green-800">> AWAITING VIDEO INPUT.</span>
        </div>

        <button onclick="startAudit()" id="audit-btn" class="border border-green-500 hover:bg-green-500/20 text-green-400 py-3 rounded uppercase text-xs tracking-widest transition-all active:scale-95 w-full shrink-0">
            [ EXECUTE_BINARY_AUDIT ]
        </button>
    </div>

    <script>
        async function init() {
            try {
                const sdk = window.farcaster?.FrameSDK;
                if (sdk) {
                    const context = await sdk.context;
                    if (context?.user) {
                        document.getElementById('user-name').innerText = context.user.username.toUpperCase();
                    }
                    sdk.actions.ready();
                    console.log("PoA Labs: Frame SDK Online");
                } else {
                    console.log("PoA Labs: Standard Web Mode");
                }
            } catch (err) {
                console.warn("PoA Labs: SDK initialization skipped (Non-Frame env)");
            }
        }

        // 预留的 Mint NFT 伪上链函数
        function mintNFT(nftMetadata) {
            const btn = document.getElementById('audit-btn');
            const box = document.getElementById('status-box');

            // 按钮变形：进入上链状态
            btn.innerText = "[ MINTING TO BASE CHAIN... ]";
            btn.classList.add('animate-pulse');
            btn.disabled = true;

            box.innerHTML = `
                <div class="text-left w-full h-full flex flex-col justify-center space-y-2 text-[10px]">
                    <p class="text-green-400">> PACKAGING POA EVIDENCE...</p>
                    <p class="text-green-500">> SIGNING WITH ECDSA KEY...</p>
                    <p class="text-green-600 animate-pulse">> BROADCASTING TO BASE NETWORK...</p>
                </div>
            `;

            // 模拟 2.5 秒的链上确认延迟
            setTimeout(() => {
                btn.innerText = "[ VIEW ON BASESCAN ]";
                btn.classList.remove('animate-pulse');
                btn.disabled = false;
                // 点击跳转 Basescan
                btn.onclick = () => window.open('https://basescan.org/', '_blank');
                
                // 状态框展示终极成功画面
                box.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center space-y-2">
                        <div class="text-green-400 text-lg font-bold animate-pulse">SUCCESS</div>
                        <div class="text-[10px] text-green-500">> POA EVIDENCE SECURED ON-CHAIN</div>
                        <div class="text-[10px] text-green-600">> NETWORK: BASE MAINNET</div>
                        <div class="text-[10px] text-green-400 font-mono mt-2 bg-green-900/30 p-1 border border-green-800">> TOKEN_ID: #${Math.floor(Math.random() * 90000) + 10000}</div>
                    </div>
                `;
            }, 2500);
        }

        async function startAudit() {
            const box = document.getElementById('status-box');
            const scanner = document.getElementById('scanner');
            const btn = document.getElementById('audit-btn');

            try {
                const fileInput = document.getElementById('video-upload');
                if (!fileInput.files.length) {
                    throw new Error("NO_VIDEO_SOURCE_SELECTED");
                }

                btn.disabled = true;
                scanner.classList.remove('hidden');
                box.innerHTML = `<p class="text-green-400">> INITIATING SECURE FETCH...</p>`;

                const formData = new FormData();
                const ruleVal = document.getElementById('rule-input').value.trim();
                const finalRule = ruleVal ? ruleVal : 'Analyze the actions in this video.';
                formData.append('rule_description', finalRule);
                formData.append('video', fileInput.files[0]);

                const response = await fetch('/analyze', {  
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errText = await response.text();
                    throw new Error(`HTTP_${response.status}: ${errText.substring(0, 40)}`);
                }

                const arrayBuffer = await response.arrayBuffer();
                box.innerHTML += `<p>> RECEIVED: ${arrayBuffer.byteLength} BYTES (BINARY)</p>`;
                box.innerHTML += `<p class="animate-pulse">> DECODING MSGPACK PAYLOAD...</p>`;
                
                const decodedData = MessagePack.decode(new Uint8Array(arrayBuffer));
                
                setTimeout(() => {
                    scanner.classList.add('hidden');
                    const analysis = decodedData.analysis;
                    
                    if (!analysis) {
                        box.innerHTML = `<p class="text-red-500">> ERR: INVALID_ANALYSIS_FORMAT</p><pre class="text-[8px] mt-2">${JSON.stringify(decodedData, null, 2)}</pre>`;
                        btn.disabled = false;
                        return;
                    }

                    box.innerHTML = `
                        <div class="text-left w-full h-full flex flex-col">
                            <h2 class="${analysis.is_goal ? 'text-green-400' : 'text-red-500'} font-bold text-sm mb-2 text-center animate-pulse">VERDICT: ${analysis.is_goal ? 'APPROVED' : 'REJECTED'}</h2>
                            <div class="text-[9px] text-green-500 space-y-1">
                                <p>> GOAL_ACHIEVED: <span class="${analysis.is_goal ? 'text-green-400' : 'text-red-500'}">${analysis.is_goal ? 'YES' : 'NO'}</span></p>
                                <p>> CONFIDENCE: ${analysis.confidence ? (analysis.confidence * 100).toFixed(1) + '%' : 'N/A'}</p>
                                <p>> CHEAT_SUSPECTED: <span class="${analysis.cheat_suspected ? 'text-red-500' : 'text-green-400'}">${analysis.cheat_suspected ? 'YES' : 'CLEAN'}</span></p>
                            </div>
                            <div class="mt-2 text-[8px] text-green-600 border-t border-green-900 pt-2 overflow-y-auto no-scrollbar">
                                <p class="mb-1">> REASONING:</p>
                                <p class="text-green-400 leading-tight">${analysis.reasoning || 'No reasoning provided.'}</p>
                            </div>
                        </div>
                    `;

                    // 核心逻辑：动态转变按钮状态
                    btn.disabled = false;
                    if (analysis.is_goal) {
                        // 验证通过：变成强烈的绿色 MINT 按钮
                        btn.innerText = "[ MINT_ONCHAIN_EVIDENCE ]";
                        btn.classList.remove('text-green-400', 'border-green-500', 'hover:bg-green-500/20');
                        btn.classList.add('text-black', 'bg-green-500', 'hover:bg-green-400', 'font-bold');
                        btn.onclick = () => mintNFT(decodedData.nft_metadata);
                    } else {
                        // 验证失败：变成重试按钮
                        btn.innerText = "[ RETRY_VERIFICATION ]";
                        btn.classList.remove('text-green-400', 'border-green-500', 'hover:bg-green-500/20');
                        btn.classList.add('text-red-500', 'border-red-500', 'hover:bg-red-500/20');
                        btn.onclick = () => window.location.reload();
                    }
                }, 1000);

            } catch (e) {
                console.error("Audit Error:", e);
                box.innerHTML += `<p class="text-red-500 mt-2">> ERR: ${e.message}</p>`;
                scanner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
