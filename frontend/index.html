<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta property="fc:frame" content='{"version":"next","imageUrl":"https://proof-of-action-eight.vercel.app/videoframe_7948.png","button":{"title":"Launch PoA Judge","action":{"type":"launch_frame","name":"PoA Labs","url":"https://proof-of-action-eight.vercel.app/","splashImageUrl":"https://proof-of-action-eight.vercel.app/videoframe_7948.png","splashBackgroundColor":"#000000"}}}' />

    <title>PoA Labs - Zero Trust AI Judge</title>

    <script>
        (function () {
            const secureNetworkAPI = (apiName) => {
                const originalAPI = window[apiName];
                try {
                    const funcStr = Function.prototype.toString.call(originalAPI);
                    if (!funcStr.includes('[native code]')) { triggerFallback(apiName); return; }
                } catch (e) { triggerFallback(apiName); return; }

                try {
                    Object.defineProperty(window, apiName, { value: originalAPI, writable: false, configurable: false });
                } catch (err) { triggerFallback(apiName); }
            };
            const triggerFallback = (apiName) => {
                console.error(`[Security Breach] ${apiName} altered!`);
                window.location.reload();
            };
            secureNetworkAPI('fetch');
            secureNetworkAPI('XMLHttpRequest');
        })();
    </script>

    <script src="https://unpkg.com/@msgpack/msgpack"></script>
    <script src="https://cdn.jsdelivr.net/npm/@farcaster/frame-sdk/dist/index.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes scan { 0% { top: -10%; } 100% { top: 110%; } }
        .scan-line { position: absolute; width: 100%; height: 2px; background: rgba(34, 197, 94, 0.5); box-shadow: 0 0 15px 2px rgba(34, 197, 94, 0.8); animation: scan 2s linear infinite; }
        .matrix-text { font-family: 'Courier New', Courier, monospace; }
    </style>
</head>

<body class="bg-black text-green-500 flex flex-col items-center justify-center h-screen p-6 overflow-hidden">

    <div class="border-2 border-green-900 bg-black/80 p-6 rounded-lg w-full max-w-md relative overflow-hidden shadow-[0_0_20px_rgba(0,50,0,0.5)]">
        <div id="scanner" class="hidden scan-line"></div>

        <header class="mb-6 border-b border-green-900 pb-2 flex justify-between items-end">
            <div>
                <h1 class="text-xl font-bold tracking-widest uppercase">PoA Labs</h1>
                <p class="text-[9px] text-green-700 matrix-text">SECURE_TUNNEL: <span id="user-name">GUEST</span></p>
            </div>
            <div class="text-[8px] text-green-800 text-right">
                ZERO_TRUST: ACTIVE<br>MSGPACK: WASM_ON
            </div>
        </header>
        
        <div id="status-box" class="h-48 border border-green-900/50 bg-green-950/10 rounded mb-6 matrix-text text-[10px] p-4 overflow-y-auto">
            <span class="animate-pulse">> SYSTEM READY...</span><br>
            <span class="text-green-800">> NETWORK STACK LOCKED.</span>
        </div>

        <button onclick="startAudit()" id="audit-btn" class="border border-green-500 hover:bg-green-500/20 text-green-400 py-3 rounded uppercase text-xs tracking-widest transition-all active:scale-95 w-full">
            [ EXECUTE_BINARY_AUDIT ]
        </button>
    </div>

    <script>
        async function init() {
            const sdk = window.farcaster.FrameSDK;
            const context = await sdk.context;
            if (context?.user) {
                document.getElementById('user-name').innerText = context.user.username.toUpperCase();
            }
            sdk.actions.ready();
        }

        async function startAudit() {
            const box = document.getElementById('status-box');
            const scanner = document.getElementById('scanner');
            const btn = document.getElementById('audit-btn');

            btn.disabled = true;
            scanner.classList.remove('hidden');
            box.innerHTML += `<p class="text-green-400 mt-2">> INITIATING SECURE FETCH...</p>`;

            try {
                // 模拟你的原始分析逻辑，但指向你的 API
                const formData = new FormData();
                formData.append('rule_description', 'FRAME_AUDIT');
                formData.append('video', new Blob(['fake_data']), 'audit.mp4');

                // 调用你的后端 /api/proof-of-action (或者 /analyze)
                const response = await fetch('/api/proof-of-action', { 
                    method: 'POST', 
                    body: formData 
                });

                // 使用你原始的二进制处理逻辑
                const arrayBuffer = await response.arrayBuffer();
                box.innerHTML += `<p>> RECEIVED: ${arrayBuffer.byteLength} BYTES (ENCODED)</p>`;
                
                // MessagePack 解码
                const decodedData = MessagePack.decode(new Uint8Array(arrayBuffer));
                
                setTimeout(() => {
                    scanner.classList.add('hidden');
                    box.innerHTML = `
                        <div class="text-center py-4">
                            <h2 class="text-green-400 font-bold text-lg mb-1 animate-pulse">VERIFIED</h2>
                            <pre class="text-[9px] text-left bg-green-900/20 p-2 mt-2 border border-green-800">
${JSON.stringify(decodedData, null, 2)}
                            </pre>
                        </div>
                    `;
                }, 1500);
            } catch (e) {
                box.innerHTML += `<p class="text-red-500">> ERR: SEC_CHANNEL_FAILED</p>`;
                scanner.classList.add('hidden');
                btn.disabled = false;
            }
        }

        init();
    </script>
</body>
</html>
